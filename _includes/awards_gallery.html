{% assign awards = site.static_files | where_exp: "file", "file.path contains 'images/awards'" %}

<section class="awards-gallery">
    <div class="awards-gallery__header">
        <p class="awards-gallery__eyebrow">Selected awards</p>
    </div>

    <div class="awards-grid">
        {% for f in awards %}
        <figure class="award-item">
            <img src="{{ f.path | relative_url }}" alt="{{ f.name | split:'.' | first | replace:'-',' ' }}"
                loading="lazy">
            <figcaption>{{ f.name | split:'.' | first | replace:'-',' ' }}</figcaption>
        </figure>
        {% endfor %}
    </div>
</section>

<style>
    .awards-gallery {
        margin: 2.5rem 0;
        padding: 1.25rem;
        border: 1px solid #e7edf3;
        border-radius: 1.25rem;
        background: linear-gradient(180deg, rgba(247, 250, 252, 0.9), #fff);
    }

    .awards-gallery__header {
        margin-bottom: 1rem;
    }

    .awards-gallery__eyebrow {
        margin: 0 0 0.3rem;
        color: #355c7d;
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .awards-gallery h2 {
        margin: 0;
        font-size: 1.45rem;
    }

    .awards-gallery__lead {
        margin: 0.45rem 0 0;
        color: #5a6978;
        line-height: 1.65;
    }

    .awards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 1rem;
    }

    .award-item {
        margin: 0;
        padding: 0.75rem;
        border: 1px solid #e5ebf1;
        border-radius: 1rem;
        background: #fff;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.04);
    }

    .award-item img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border-radius: 0.75rem;
        display: block;
        background: #eef3f7;
    }

    .award-item figcaption {
        margin-top: 0.65rem;
        color: #334155;
        font-size: 0.94rem;
        line-height: 1.45;
        text-align: center;
    }

    @media (max-width: 640px) {
        .awards-gallery {
            padding: 1rem;
        }
    }
</style>
